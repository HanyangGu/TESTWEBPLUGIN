<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AI PDF Uploader</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090f;--surface:#111118;--surface2:#1a1a25;
      --border:#252535;--accent:#6c63ff;--accent2:#ff63a8;
      --text:#e4e4f0;--muted:#666688;
      --ok:#3de8a0;--warn:#ffb84d;--err:#ff4f6e;--ai:#c084fc;
      --r:10px;
    }
    body{width:400px;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);
      background-size:20px 20px;pointer-events:none;z-index:0;}

    .wrap{position:relative;z-index:1;padding:18px;display:flex;flex-direction:column;gap:13px;}

    /* header */
    .hdr{display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:9px;}
    .orb{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .logo-txt{font-size:14px;font-weight:800;letter-spacing:-.3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .cfg-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--surface);
      border:1px solid var(--border);padding:3px 8px;border-radius:20px;cursor:pointer;transition:all .2s;}
    .cfg-btn:hover{border-color:var(--accent);color:var(--accent);}

    /* config */
    .cfg{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
      padding:12px;display:none;flex-direction:column;gap:10px;}
    .cfg.open{display:flex;}
    .lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
    .row{display:flex;gap:7px;}
    input[type=password],input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--border);
      border-radius:7px;padding:7px 11px;color:var(--text);font-family:'DM Mono',monospace;font-size:11.5px;outline:none;transition:border-color .2s;}
    input:focus{border-color:var(--accent);}
    .sbtn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;
      padding:7px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
      cursor:pointer;transition:all .2s;white-space:nowrap;}
    .sbtn:hover{border-color:var(--accent);color:var(--accent);}

    hr{border:none;border-top:1px solid var(--border);margin:0 -18px;}

    /* target url */
    .url-wrap{position:relative;}
    .url-wrap input{width:100%;padding-right:72px;}
    .use-tab{position:absolute;right:8px;top:50%;transform:translateY(-50%);
      background:var(--accent);border:none;border-radius:5px;padding:3px 8px;
      color:white;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .2s;}
    .use-tab:hover{opacity:.8;}

    /* drop zone */
    .dz{border:2px dashed var(--border);border-radius:var(--r);padding:22px 16px;
      text-align:center;cursor:pointer;transition:all .25s;background:var(--surface);position:relative;overflow:hidden;}
    .dz::before{content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(108,99,255,.06),rgba(255,99,168,.06));opacity:0;transition:.25s;}
    .dz:hover,.dz.over{border-color:var(--accent);transform:translateY(-1px);}
    .dz:hover::before,.dz.over::before{opacity:1;}
    .dz-icon{font-size:26px;display:block;margin-bottom:5px;}
    .dz-title{font-size:13px;font-weight:700;}
    .dz-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
    #fi{display:none;}

    /* file pill */
    .pill{display:none;align-items:center;gap:9px;background:var(--surface);
      border:1px solid var(--border);border-radius:8px;padding:9px 13px;}
    .pill.show{display:flex;}
    .fi{flex:1;overflow:hidden;}
    .fn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .fs{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
    .rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;transition:color .2s;}
    .rm:hover{color:var(--err);}

    /* instruction */
    .instr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;}
    textarea{background:transparent;border:none;outline:none;color:var(--text);
      font-family:'DM Mono',monospace;font-size:11px;line-height:1.6;resize:none;width:100%;min-height:44px;}
    textarea::placeholder{color:var(--muted);}

    /* status bar */
    .status-bar{display:none;align-items:center;gap:8px;background:rgba(108,99,255,.1);
      border:1px solid rgba(108,99,255,.25);border-radius:8px;padding:8px 12px;}
    .status-bar.show{display:flex;}
    .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);
      flex-shrink:0;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
    .status-txt{font-size:11px;font-weight:600;color:var(--accent);flex:1;}
    .step-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

    /* go / stop buttons */
    .go{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);
      padding:13px;color:white;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
      cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
    .go::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:.2s;}
    .go:hover::after{background:rgba(255,255,255,.1);}
    .go:active{transform:scale(.98);}
    .go:disabled{opacity:.35;cursor:not-allowed;transform:none;}
    .stop{background:transparent;border:1px solid var(--err);border-radius:var(--r);
      padding:10px;color:var(--err);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
      cursor:pointer;transition:all .2s;display:none;}
    .stop.show{display:block;}
    .stop:hover{background:rgba(255,79,110,.1);}

    /* log */
    .log{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
      padding:10px;max-height:190px;overflow-y:auto;display:none;flex-direction:column;gap:4px;}
    .log.show{display:flex;}
    .le{display:flex;align-items:flex-start;gap:7px;animation:fi .2s ease;}
    @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
    .ld{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
    .ld.spin{background:var(--accent);animation:pulse 1s infinite;}
    .ld.ok{background:var(--ok);}
    .ld.err{background:var(--err);}
    .ld.warn{background:var(--warn);}
    .ld.ai{background:var(--ai);}
    .ld.info{background:var(--accent);}
    .lt{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text);line-height:1.5;word-break:break-word;}

    /* screenshot */
    .ss{border-radius:8px;overflow:hidden;border:1px solid var(--border);display:none;position:relative;}
    .ss.show{display:block;}
    .ss img{width:100%;display:block;max-height:130px;object-fit:cover;object-position:top;}
    .ss-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(9,9,15,.8);
      font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);padding:4px 8px;backdrop-filter:blur(4px);}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <div class="logo"><div class="orb">🤖</div><span class="logo-txt">AI PDF Uploader</span></div>
    <button class="cfg-btn" id="cfgToggle">⚙ Config</button>
  </div>

  <!-- Config -->
  <div class="cfg" id="cfgPanel">
    <div>
      <div class="lbl">OpenAI API Key</div>
      <div class="row">
        <input type="password" id="apiKey" placeholder="sk-..."/>
        <button class="sbtn" id="saveKey">Save</button>
      </div>
    </div>
  </div>

  <!-- Canvas badge -->
  <div id="canvasBadge" style="display:none;align-items:center;gap:8px;background:rgba(229,25,50,.1);border:1px solid rgba(229,25,50,.3);border-radius:8px;padding:7px 12px;">
    <span style="font-size:14px;">🎓</span>
    <span style="font-size:11px;font-weight:700;color:#e51932;">Canvas detected — assignment submission mode</span>
  </div>

  <hr/>

  <!-- URL -->
  <div>
    <div class="lbl">Target Website</div>
    <div class="url-wrap">
      <input type="text" id="targetUrl" placeholder="https://drive.google.com"/>
      <button class="use-tab" id="useTab">Use Tab</button>
    </div>
  </div>

  <!-- Drop zone -->
  <div class="dz" id="dz">
    <span class="dz-icon">📄</span>
    <div class="dz-title">Drop PDF here</div>
    <div class="dz-sub">or click to browse · PDF only</div>
    <input type="file" id="fi" accept=".pdf,application/pdf"/>
  </div>
  <div class="pill" id="pill">
    <span style="font-size:18px;">📑</span>
    <div class="fi"><div class="fn" id="fn"></div><div class="fs" id="fs"></div></div>
    <button class="rm" id="rm">✕</button>
  </div>

  <!-- Instruction -->
  <div class="instr">
    <div class="lbl" style="margin-bottom:6px;">Instructions for AI</div>
    <textarea id="instr" rows="2" maxlength="400"
      placeholder="e.g. Submit to the Week 3 Assignment in MATH101. or just: Submit my assignment."></textarea>
  </div>

  <!-- Status (shown while running) -->
  <div class="status-bar" id="statusBar">
    <div class="pulse"></div>
    <span class="status-txt">AI Agent running…</span>
    <span class="step-badge" id="stepBadge">0/25</span>
  </div>

  <!-- Screenshot preview -->
  <div class="ss" id="ss"><img id="ssImg" src="" alt=""/><div class="ss-lbl" id="ssLbl">Analyzing…</div></div>

  <!-- Buttons -->
  <button class="go" id="goBtn" disabled>✦ Start AI Agent</button>
  <button class="stop" id="stopBtn">■ Stop Agent</button>

  <!-- Log -->
  <div class="log" id="logPanel"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
